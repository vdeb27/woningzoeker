# Scoring configuration for neighborhood analysis

# ORS (OpenRouteService) multimodale afstandsdrempels
# Bepaalt welke modaliteit gebruikt wordt op basis van hemelsbreed afstand
ors_drempels:
  lopen:
    max_hemelsbreed_m: 800       # < 800m hemelsbreed → foot-walking
    max_reistijd_min: 10         # > 10 min lopen → promoveer naar fietsen
  fietsen:
    max_hemelsbreed_m: 5000      # < 5000m hemelsbreed → cycling-regular
    max_reistijd_min: 30         # > 30 min fietsen → promoveer naar auto
  # alles >= 5000m hemelsbreed → driving-car
# Each indicator has a weight and direction
# Column names reference indicator keys from collectors, not raw CBS column names

# CBS dataset identifiers
datasets:
  kerncijfers: "86165NED"  # Kerncijfers wijken en buurten 2025
  nabijheid: "86270NED"    # Nabijheid voorzieningen 2025

# Category definitions for radar chart and grouping
categories:
  inkomen:
    label: "Inkomen & welvaart"
    indicators:
      - income_per_inhabitant
      - labour_participation
      - high_income_share
      - low_income_share
    color: "#3b82f6"
    weight: 0.18

  veiligheid:
    label: "Veiligheid"
    indicators:
      - crime_per_1000
      - leefbaarometer_veiligheid
      - geluidhinder_buren
    color: "#ef4444"
    weight: 0.14

  voorzieningen:
    label: "Voorzieningen"
    indicators:
      - afstand_huisarts
      - afstand_school
      - afstand_supermarkt
      - afstand_restaurant
      - afstand_bioscoop
      - afstand_zwembad
      - afstand_bibliotheek
      - afstand_park
      - schoolkwaliteit_po
      - scholen_vo_nabij
    color: "#22c55e"
    weight: 0.17

  woningen:
    label: "Woningkwaliteit"
    indicators:
      - woz_value
      - gas_consumption
      - electricity_consumption
      - bouwjaar_nieuw_pct
      - zonnestroom
    color: "#f59e0b"
    weight: 0.16

  bereikbaarheid:
    label: "Bereikbaarheid"
    indicators:
      - cars_per_household
      - afstand_treinstation
      - afstand_oprit
      - ov_score
      - afstand_ov_halte
      - ov_frequentie_spits
    color: "#8b5cf6"
    weight: 0.14

  leefbaarheid:
    label: "Leefbaarheid"
    indicators:
      - leefbaarometer_score
      - leefbaarometer_fysiek
      - geluidhinder_weg
      - tevredenheid_woonomgeving
    color: "#06b6d4"
    weight: 0.14

  milieu:
    label: "Milieu & gezondheid"
    indicators:
      - lucht_no2
      - lucht_pm10
      - lucht_pm25
      - pfas_verontreiniging
      - pfas_bodemkaart
    color: "#10b981"
    weight: 0.07

# Scoring indicators
# Column names match indicator keys from collectors (stored as flat columns in DataFrame)
indicators:
  # === Inkomen & welvaart ===
  income_per_inhabitant:
    column: gem_inkomen
    higher_is_better: true
    weight: 0.12
    category: inkomen
    label: Gem. inkomen per inwoner
    unit: euro
    description: Gemiddeld inkomen per inwoner (koopkracht)

  labour_participation:
    column: netto_arbeidsparticipatie
    higher_is_better: true
    weight: 0.10
    category: inkomen
    label: Arbeidsparticipatie
    unit: percentage
    description: Hogere arbeidsparticipatie wijst op economisch actieve bevolking

  high_income_share:
    column: huishoudens_hoog_inkomen_pct
    higher_is_better: true
    weight: 0.04
    category: inkomen
    label: Huishoudens hoog inkomen
    unit: percentage
    description: Percentage huishoudens met een hoog inkomen

  low_income_share:
    column: huishoudens_laag_inkomen_pct
    higher_is_better: false
    weight: 0.04
    category: inkomen
    label: Huishoudens laag inkomen
    unit: percentage
    description: Percentage huishoudens met een laag inkomen

  # === Veiligheid ===
  crime_per_1000:
    column: misdrijven_per_1000
    higher_is_better: false
    weight: 0.07
    category: veiligheid
    label: Misdrijven per 1.000 inwoners
    unit: per_1000
    description: Minder geregistreerde misdrijven per 1.000 inwoners

  leefbaarometer_veiligheid:
    column: leefbaarometer_veiligheid
    higher_is_better: true
    weight: 0.05
    category: veiligheid
    label: Leefbaarometer veiligheid
    unit: score
    description: Veiligheidsscore uit Leefbaarometer 3.0

  geluidhinder_buren:
    column: geluidhinder_buren_pct
    higher_is_better: false
    weight: 0.03
    category: veiligheid
    label: Geluidhinder buren
    unit: percentage
    description: Percentage ernstig gehinderd door burengeluid

  # === Voorzieningen ===
  afstand_huisarts:
    column: afstand_huisarts
    higher_is_better: false
    weight: 0.03
    category: voorzieningen
    label: Afstand huisarts
    unit: km
    description: Afstand tot dichtstbijzijnde huisartsenpraktijk

  afstand_school:
    column: afstand_basisonderwijs
    higher_is_better: false
    weight: 0.02
    category: voorzieningen
    label: Afstand basisschool
    unit: km
    description: Afstand tot dichtstbijzijnde basisschool

  afstand_supermarkt:
    column: afstand_supermarkt
    higher_is_better: false
    weight: 0.03
    category: voorzieningen
    label: Afstand supermarkt
    unit: km
    description: Afstand tot dichtstbijzijnde grote supermarkt

  afstand_restaurant:
    column: afstand_restaurant
    higher_is_better: false
    weight: 0.01
    category: voorzieningen
    label: Afstand restaurant
    unit: km
    description: Afstand tot dichtstbijzijnde restaurant

  afstand_bioscoop:
    column: afstand_bioscoop
    higher_is_better: false
    weight: 0.01
    category: voorzieningen
    label: Afstand bioscoop
    unit: km
    description: Afstand tot dichtstbijzijnde bioscoop

  afstand_zwembad:
    column: afstand_zwembad
    higher_is_better: false
    weight: 0.01
    category: voorzieningen
    label: Afstand zwembad
    unit: km
    description: Afstand tot dichtstbijzijnde zwembad

  afstand_bibliotheek:
    column: afstand_bibliotheek
    higher_is_better: false
    weight: 0.01
    category: voorzieningen
    label: Afstand bibliotheek
    unit: km
    description: Afstand tot dichtstbijzijnde bibliotheek

  afstand_park:
    column: afstand_park
    higher_is_better: false
    weight: 0.02
    category: voorzieningen
    label: Afstand park
    unit: km
    description: Afstand tot dichtstbijzijnde park of plantsoen

  schoolkwaliteit_po:
    column: gem_advies_havo_vwo_pct
    higher_is_better: true
    weight: 0.02
    category: voorzieningen
    label: Schoolkwaliteit basisonderwijs
    unit: percentage
    description: Gem. % leerlingen met HAVO/VWO advies bij nabije basisscholen

  scholen_vo_nabij:
    column: scholen_vo_binnen_2km
    higher_is_better: true
    weight: 0.01
    category: voorzieningen
    label: Middelbare scholen nabij
    unit: aantal
    description: Aantal middelbare scholen binnen 2 km

  # === Woningkwaliteit ===
  woz_value:
    column: gem_woz_waarde
    higher_is_better: false
    weight: 0.08
    category: woningen
    label: Gem. WOZ-waarde
    unit: euro
    description: Gemiddelde WOZ-waarde als proxy voor woningkwaliteit

  gas_consumption:
    column: gem_gasverbruik
    higher_is_better: false
    weight: 0.06
    category: woningen
    label: Gem. gasverbruik
    unit: m3
    description: Lager gasverbruik duidt op energiezuinigere woningen

  electricity_consumption:
    column: gem_elektraverbruik
    higher_is_better: false
    weight: 0.04
    category: woningen
    label: Gem. elektraverbruik
    unit: kWh
    description: Lager elektriciteitsverbruik per woning

  bouwjaar_nieuw_pct:
    column: bouwjaar_nieuw_pct
    higher_is_better: true
    weight: 0.02
    category: woningen
    label: Nieuwbouw (afgelopen 10 jaar)
    unit: percentage
    description: Percentage woningen gebouwd in afgelopen 10 jaar

  zonnestroom:
    column: woningen_met_zonnestroom
    higher_is_better: true
    weight: 0.02
    category: woningen
    label: Woningen met zonnestroom
    unit: aantal
    description: Aantal woningen met zonnepanelen

  # === Bereikbaarheid ===
  cars_per_household:
    column: personenautos_per_huishouden
    higher_is_better: false
    weight: 0.03
    category: bereikbaarheid
    label: "Auto's per huishouden"
    unit: ratio
    description: Minder auto's per huishouden duidt op betere OV/bereikbaarheid

  afstand_treinstation:
    column: afstand_treinstation
    higher_is_better: false
    weight: 0.03
    category: bereikbaarheid
    label: Afstand treinstation
    unit: km
    description: Afstand tot dichtstbijzijnde treinstation

  afstand_oprit:
    column: afstand_oprit_hoofdverkeersweg
    higher_is_better: false
    weight: 0.02
    category: bereikbaarheid
    label: Afstand snelweg
    unit: km
